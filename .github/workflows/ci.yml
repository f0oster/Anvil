# CI Pipeline -- Anvil

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: 'CI (${{ matrix.os }})'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Bootstrap
        shell: pwsh
        run: ./build/bootstrap.ps1
      - name: Build
        shell: pwsh
        run: Invoke-Build -File ./build/module.build.ps1
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.os }}
          path: ./artifacts/testResults/
          if-no-files-found: warn
      - name: Upload package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: module-package
          path: ./artifacts/package/
          if-no-files-found: error
      - name: Upload archive
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: module-archive
          path: ./artifacts/archive/
          if-no-files-found: error
